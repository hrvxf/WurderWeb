name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contract-tests:
    name: contract-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run member data contract tests
        run: npm run test:contract

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Legacy route string gate
        run: npm run ci:legacy-surface-gate

      - name: Canonical gameType literal gate
        run: npm run ci:game-type-literal-gate

      - name: Run unit tests
        run: npm test
